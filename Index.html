<script>

let medicines = [];
let total = 0;
let verified = false;
let patientImage = "";

function previewPhoto(){
 let file = document.getElementById("photo").files[0];
 let reader = new FileReader();
 reader.onload = e=>{
  patientImage = e.target.result;
  let img = document.getElementById("preview");
  img.src = patientImage;
  img.style.display="block";
 };
 if(file) reader.readAsDataURL(file);
}

function getDateTime(){
 return new Date().toLocaleString();
}

function saveData(){
 let valid=true;
 if(!val("name")){err("nameErr","Enter name");valid=false;} else err("nameErr","");
 if(!val("age")){err("ageErr","Enter age");valid=false;} else err("ageErr","");
 if(!val("address")){err("addrErr","Enter address");valid=false;} else err("addrErr","");
 if(!val("bp")||!val("temp")||!val("pulse")){err("vitalErr","Fill all");valid=false;} else err("vitalErr","");
 if(!valid) return;
 alert("Saved");
}

// ✅ ADD MED UPDATED
function addMed(name,price){
 let dose = prompt("Kitni baar leni hai? (e.g. 2)");
 let time = prompt("Day ya Night? (day/night)");

 if(!dose || !time){
  alert("Dose aur time jaruri hai");
  return;
 }

 let icon = time.toLowerCase()=="day" ? "🌞" : "🌙";

 medicines.push({name,price,dose,time,icon});
 total+=price;

 document.getElementById("cart").innerText=
 medicines.map(m=> m.name+" "+m.icon+" ("+m.dose+"x)").join(", ");

 document.getElementById("total").innerText="Total ₹"+total;
}

// ✅ DOCTOR MESSAGE UPDATED
function sendToDoctor(){
 if(medicines.length==0){
  alert("Select medicine");
  return;
 }

 alert("Doctor se baat karke hi dose confirm hoga 📞\nCall: 9876543210");
}

function showDoctor(){
 document.getElementById("doctorBox").style.display="block";
}

function verifyDoctor(){
 if(val("otp")==="123456"){
  verified=true;
  alert("✔ Doctor Verified");
  document.getElementById("payBox").style.display="block";
 } else err("docErr","Wrong OTP");
}

function payNow(){
 if(!verified){alert("Verify doctor");return;}
 alert("Payment Success");
 downloadPDF();
}

// ✅ PDF UPDATED
function downloadPDF(){
 const { jsPDF } = window.jspdf;
 const doc = new jsPDF();

 let y=20;

 doc.setFontSize(16);
 doc.text("PHARMACY 1ST YEAR SEC (B)",20,y);
 y+=10;

 doc.setFontSize(12);
 doc.text("Health Care Prescription",20,y);
 y+=15;

 doc.text("Date: "+getDateTime(),20,y); y+=10;

 if(patientImage){
  doc.addImage(patientImage,'JPEG',150,20,40,40);
 }

 doc.text("Name: "+val("name"),20,y); y+=10;
 doc.text("Age: "+val("age"),20,y); y+=10;
 doc.text("Address: "+val("address"),20,y); y+=10;

 y+=10;

 doc.text("BP: "+val("bp"),20,y); y+=10;
 doc.text("Temp: "+val("temp"),20,y); y+=10;
 doc.text("Pulse: "+val("pulse"),20,y); y+=15;

 doc.text("Medicines:",20,y); y+=10;

 medicines.forEach(m=>{
  doc.text(m.name+" "+m.icon+" - "+m.dose+" times ₹"+m.price,20,y);
  y+=10;
 });

 doc.text("Total ₹"+total,20,y); y+=15;

 doc.text("Doctor: "+val("docName"),20,y); y+=10;
 doc.text("Signature: ____________",20,y);

 y+=25;

 // 🔴 ROUND GOVT STAMP
 doc.setDrawColor(255,0,0);
 doc.circle(105,y,30);

 doc.setTextColor(255,0,0);
 doc.setFontSize(10);

 doc.text("GOVT OF INDIA",85,y-5);
 doc.text("APPROVED",95,y);
 doc.text("HEALTH DEPT",85,y+5);

 doc.save("Prescription.pdf");
}

function callDoctor(){
 window.location.href="tel:9876543210";
 speak("Doctor ko call kiya ja raha hai");
}

function sendEmergency(){
 navigator.geolocation.getCurrentPosition(pos=>{
  document.getElementById("locStatus").innerText=
   "Location: "+pos.coords.latitude+", "+pos.coords.longitude;
  speak("Doctor aapse jaldi milenge");
 });
}

function callAmbulance(){
 window.location.href="tel:108";
 speak("Ambulance call ho rahi hai");
}

function speak(text){
 let msg=new SpeechSynthesisUtterance(text);
 msg.lang="hi-IN";
 speechSynthesis.speak(msg);
}

function val(id){return document.getElementById(id).value;}
function err(id,msg){document.getElementById(id).innerText=msg;}

</script>
